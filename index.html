<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时间穿越指南</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at 50% 15%, rgba(102, 126, 234, 0.35), transparent 45%),
                linear-gradient(135deg, #0d0d1a, #16162e 60%, #07070f);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(#ffffff 1px, transparent 1px),
                radial-gradient(#ffffff 1px, transparent 1px);
            background-size: 80px 80px, 120px 120px;
            background-position: 0 0, 40px 60px;
            opacity: 0.15;
            animation: moveStars 20s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes moveStars {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(120px);
            }
        }

        /* 🌟 重构：黄金比例的科技舱卡片 */
        .card {
            width: 100%;
            max-width: 440px;
            padding: 36px 28px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* 统一控制纵向间距，杜绝死空间 */
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .badge {
            align-self: center;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #bfc8ff;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(180deg, #fff 0%, #c7ceff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .desc {
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.6);
            padding: 0 10px;
        }

        /* ⏱️ 仪表盘圆环微调 */
        .time-circle {
            width: 150px;
            height: 150px;
            margin: 4px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, rgba(0, 0, 0, 0.2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                inset 0 0 20px rgba(255, 255, 255, 0.05),
                0 8px 32px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease;
        }

        .count {
            width: 120px;
            font-size: 26px;
            font-weight: 700;
            line-height: 1.3;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(191, 200, 255, 0.6);
            word-wrap: break-word;
        }

        .status-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .status {
            font-size: 14px;
            color: #cbd3ff;
            font-weight: 500;
        }

        .arrival {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.45);
        }

        .options-title {
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* 🎛️ 重构：绝对规整的 4列 矩阵 */
        .options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
        }

        .option-btn {
            height: 38px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .option-btn.active {
            color: #0b0b14;
            background: linear-gradient(135deg, #ffffff 0%, #bfc8ff 100%);
            border-color: #ffffff;
            box-shadow: 0 4px 14px rgba(130, 150, 255, 0.4);
        }

        /* 🎮 底部控制栏优化 */
        .control {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .main-btn,
        .reset-btn {
            height: 48px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .main-btn {
            flex: 1;
            color: #0b0b14;
            background: linear-gradient(135deg, #ffffff 0%, #c7ceff 100%);
            box-shadow: 0 6px 20px rgba(130, 150, 255, 0.25);
        }

        .main-btn:hover:not(:disabled) {
            transform: translateY(-1.5px);
            box-shadow: 0 8px 24px rgba(130, 150, 255, 0.35);
        }

        .reset-btn {
            width: 84px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .reset-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.2);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.4;
            transform: none !important;
            box-shadow: none !important;
        }

        /* 跃迁状态下锁定除重置外的交互并提供动效 */
        .traveling .time-circle {
            border-color: rgba(140, 160, 255, 0.6);
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(102, 126, 234, 0.2);
            }

            50% {
                transform: scale(1.03);
                box-shadow: 0 0 50px rgba(166, 190, 255, 0.5);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 30px rgba(102, 126, 234, 0.2);
            }
        }

        .flash {
            position: fixed;
            inset: 0;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        .flash.active {
            animation: flash 0.6s ease-out;
        }

        @keyframes flash {
            0% {
                opacity: 0;
            }

            30% {
                opacity: 0.9;
            }

            100% {
                opacity: 0;
            }
        }

        /* 📱 极小屏幕自适应 (如折叠屏或老款小屏手机) */
        @media (max-width: 380px) {
            .card {
                padding: 28px 20px;
                gap: 16px;
            }

            .options {
                grid-template-columns: repeat(3, 1fr);
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="stars"></div>
    <div class="flash" id="flash"></div>

    <main class="card" id="card">
        <div class="badge">Time Travel Guide</div>

        <h1>时间穿越指南</h1>

        <p class="desc">
            选择一个未来时间点，启动时间跃迁装置。倒计时结束后，你将抵达未来。
        </p>

        <div class="time-circle">
            <div class="count" id="count">未启动</div>
        </div>

        <div class="status-group">
            <div class="status" id="status">当前状态：等待选择穿越时间</div>
            <div class="arrival" id="arrival">请选择一个目标时间</div>
        </div>

        <div class="options-title">选择穿越目标</div>

        <div class="options">
            <button class="option-btn active" data-label="1 秒后" data-seconds="1">1 秒</button>
            <button class="option-btn" data-label="3 秒后" data-seconds="3">3 秒</button>
            <button class="option-btn" data-label="5 秒后" data-seconds="5">5 秒</button>
            <button class="option-btn" data-label="10 秒后" data-seconds="10">10 秒</button>
            <button class="option-btn" data-label="30 秒后" data-seconds="30">30 秒</button>
            <button class="option-btn" data-label="1 分钟后" data-seconds="60">1 分钟</button>
            <button class="option-btn" data-label="5 分钟后" data-seconds="300">5 分钟</button>
            <button class="option-btn" data-label="1 小时后" data-seconds="3600">1 小时</button>
            <button class="option-btn" data-label="1 天后" data-seconds="86400">1 天</button>
            <button class="option-btn" data-label="1 周后" data-seconds="604800">1 周</button>
            <button class="option-btn" data-label="1 个月后" data-seconds="2592000">1 个月</button>
            <button class="option-btn" data-label="1 年后" data-seconds="31536000">1 年</button>
        </div>

        <div class="control">
            <button class="main-btn" id="startBtn">穿越到 1 秒后</button>
            <button class="reset-btn" id="resetBtn">重置</button>
        </div>
    </main>

    <script>
        const card = document.getElementById("card");
        const flash = document.getElementById("flash");
        const countEl = document.getElementById("count");
        const statusEl = document.getElementById("status");
        const arrivalEl = document.getElementById("arrival");
        const startBtn = document.getElementById("startBtn");
        const resetBtn = document.getElementById("resetBtn");
        const optionBtns = document.querySelectorAll(".option-btn");

        let selectedSeconds = 1;
        let selectedLabel = "1 秒后";
        let timer = null;
        let targetTime = null;

        optionBtns.forEach((btn) => {
            btn.addEventListener("click", () => {
                // 🛸 时空通道硬核锁定：如果正在穿越中，拒绝重新选择时空坐标
                if (card.classList.contains("traveling")) return;

                optionBtns.forEach((item) => item.classList.remove("active"));
                btn.classList.add("active");

                selectedSeconds = Number(btn.dataset.seconds);
                selectedLabel = btn.dataset.label;

                clearInterval(timer);
                timer = null;
                targetTime = null;

                card.classList.remove("traveling");
                startBtn.disabled = false;
                startBtn.textContent = `穿越到 ${selectedLabel}`;
                countEl.textContent = "未启动";
                statusEl.textContent = `当前状态：已选择 ${selectedLabel}`;
                arrivalEl.textContent = "点击按钮后开始倒计时";
            });
        });

        startBtn.addEventListener("click", () => {
            clearInterval(timer);

            targetTime = Date.now() + selectedSeconds * 1000;

            card.classList.add("traveling");
            startBtn.disabled = true;

            // 💡 视觉小细节：穿越中把上方的坐标按钮变灰，凸显航线锁定状态
            optionBtns.forEach(btn => { if (!btn.classList.contains('active')) btn.disabled = true; });

            statusEl.textContent = `时间通道已开启，正在穿越到 ${selectedLabel}`;

            updateCountdown();
            timer = setInterval(updateCountdown, 1000);
        });

        resetBtn.addEventListener("click", () => {
            clearInterval(timer);
            timer = null;
            targetTime = null;

            card.classList.remove("traveling");
            startBtn.disabled = false;
            optionBtns.forEach(btn => btn.disabled = false); // 解除锁定
            startBtn.textContent = `穿越到 ${selectedLabel}`;
            countEl.textContent = "未启动";
            statusEl.textContent = "当前状态：等待选择穿越时间";
            arrivalEl.textContent = "请选择一个目标时间";
        });

        function updateCountdown() {
            const remain = Math.max(0, Math.ceil((targetTime - Date.now()) / 1000));

            countEl.textContent = formatTime(remain);
            arrivalEl.textContent = `预计抵达时间：${formatDate(targetTime)}`;

            if (remain <= 0) {
                clearInterval(timer);

                card.classList.remove("traveling");
                optionBtns.forEach(btn => btn.disabled = false); // 解除锁定
                flash.classList.add("active");

                countEl.textContent = "已抵达";
                statusEl.textContent = `穿越成功！你已经抵达 ${selectedLabel} 的未来`;
                startBtn.disabled = false;
                startBtn.textContent = "再次穿越";

                setTimeout(() => {
                    flash.classList.remove("active");
                }, 600);
            }
        }

        function formatTime(seconds) {
            if (seconds <= 0) return "0 秒";

            const year = Math.floor(seconds / 31536000);
            seconds %= 31536000;

            const month = Math.floor(seconds / 2592000);
            seconds %= 2592000;

            const day = Math.floor(seconds / 86400);
            seconds %= 86400;

            const hour = Math.floor(seconds / 3600);
            seconds %= 3600;

            const minute = Math.floor(seconds / 60);
            const second = seconds % 60;

            const result = [];

            if (year) result.push(`${year}年`);
            if (month) result.push(`${month}月`);
            if (day) result.push(`${day}天`);
            if (hour) result.push(`${hour}时`);
            if (minute) result.push(`${minute}分`);
            if (second || result.length === 0) result.push(`${second}秒`);

            return result.slice(0, 2).join(""); // 精简显示前两个最大单位，避免字符撑开圆环
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);

            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            const h = String(date.getHours()).padStart(2, "0");
            const min = String(date.getMinutes()).padStart(2, "0");
            const s = String(date.getSeconds()).padStart(2, "0");

            return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }
    </script>
</body>

</html>
